<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode | default "en" }}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ if not .IsHome }}{{ .Title }} · {{ end }}{{ .Site.Title }}</title>
<meta name="description" content="{{ with .Description }}{{ . }}{{ else }}{{ .Site.Params.description }}{{ end }}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Crimson+Pro:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Cormorant:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ "css/style.css" | absURL }}">
</head>
<body>

<header>
  <div class="r-thick"></div>
  <div class="r-thin"></div>
  <div class="mast">
    <h1><a href="{{ .Site.BaseURL }}">{{ .Site.Title }}</a></h1>
  </div>
  <div class="r-bot"></div>
  <nav>
    <ul>
      {{ range .Site.Menus.main }}
      <li><a href="{{ .URL | absURL }}"{{ if $.IsMenuCurrent "main" . }} class="on"{{ end }}>{{ .Name }}</a></li>
      {{ end }}
    </ul>
  </nav>
</header>

<main>
  {{ block "main" . }}{{ end }}
</main>

<footer>&copy; {{ now.Year }} {{ .Site.Title }}</footer>

</body>
</html>
